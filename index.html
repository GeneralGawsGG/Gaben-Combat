<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gaben Clicker: Pikabu Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .tap-animation {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            font-size: 2.5rem;
            color: #3b82f6;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
            animation: float-up 0.6s ease-out forwards;
            z-index: 100;
        }

        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-180px) scale(1.6); opacity: 0; }
        }

        .gabe-main:active {
            transform: scale(0.92);
        }

        .glow-effect {
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div class="w-full max-w-[450px] bg-[#050505] flex flex-col relative border-x border-white/5">
        
        <div class="p-8 pb-2 flex justify-between items-start">
            <div class="flex flex-col">
                <span class="text-[10px] text-blue-500 font-black uppercase tracking-widest opacity-60">Баланс Steam</span>
                <div class="flex items-center gap-2">
                    <img src="https://cdn-icons-png.flaticon.com/512/217/217853.png" class="w-8 h-8 shadow-lg" alt="coin">
                    <span id="balance" class="text-4xl font-black italic tracking-tighter">0</span>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-neutral-600 font-bold uppercase">Уровень</span>
                <p class="text-blue-400 font-black text-xl" id="level">1</p>
            </div>
        </div>

        <div class="flex-1 relative flex flex-col justify-center items-center" id="click-area">
            <div class="relative group">
                <div class="absolute -inset-24 bg-blue-600/5 rounded-full blur-[120px] pointer-events-none group-active:bg-blue-600/10 transition-colors"></div>
                
                <div class="relative w-80 h-80 rounded-full border-[10px] border-[#111] bg-neutral-900 overflow-hidden shadow-2xl gabe-main transition-transform duration-75 cursor-pointer glow-effect">
                    <img src="https://cs12.pikabu.ru/post_img/2021/08/12/5/16287520021736990.jpg" 
                         class="w-full h-full object-cover pointer-events-none scale-105" 
                         alt="Gaben Newell"
                         draggable="false">
                </div>
            </div>
            <div class="mt-12 text-center">
                <p class="text-[12px] text-blue-900 font-black uppercase tracking-[0.6em] animate-pulse">Тапай по Гейбу</p>
            </div>
        </div>

        <div class="px-8 mb-12">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-2">
                    <span class="text-blue-500">⚡</span>
                    <span class="text-[10px] font-black text-neutral-600 uppercase tracking-widest">Энергия</span>
                </div>
                <span class="text-sm font-black text-blue-500 italic"><span id="energy-val">1000</span> / 1000</span>
            </div>
            <div class="h-3.5 bg-[#0a0a0a] rounded-full overflow-hidden border border-white/5 p-[2px]">
                <div id="energy-bar" class="h-full bg-gradient-to-r from-blue-900 via-blue-500 to-cyan-400 rounded-full transition-all duration-300" style="width: 100%"></div>
            </div>
        </div>

        <nav class="h-24 bg-black border-t border-white/5 flex justify-around items-center px-4 pb-4">
            <div class="flex flex-col items-center gap-1 text-blue-500">
                <span class="text-2xl">🎮</span>
                <span class="text-[9px] font-black uppercase tracking-tighter">Игра</span>
            </div>
            <div class="flex flex-col items-center gap-1 text-neutral-700 opacity-50">
                <span class="text-2xl">🛒</span>
                <span class="text-[9px] font-black uppercase tracking-tighter">Маркет</span>
            </div>
        </nav>

    </div>

    <script>
        // Инициализация данных из localStorage (сохранения)
        let coins = Number(localStorage.getItem('gaben_coins')) || 0;
        let energy = Number(localStorage.getItem('gaben_energy')) || 1000;
        const maxEnergy = 1000;
        const tapValue = 1;

        const balanceEl = document.getElementById('balance');
        const energyValEl = document.getElementById('energy-val');
        const energyBar = document.getElementById('energy-bar');
        const levelEl = document.getElementById('level');
        const clickArea = document.getElementById('click-area');

        function updateUI() {
            balanceEl.textContent = Math.floor(coins).toLocaleString();
            energyValEl.textContent = Math.floor(energy);
            energyBar.style.width = (energy / maxEnergy * 100) + '%';
            levelEl.textContent = Math.floor(coins / 1000) + 1;
            
            // Сохраняем данные
            localStorage.setItem('gaben_coins', coins);
            localStorage.setItem('gaben_energy', energy);
        }

        function spawnText(x, y) {
            const div = document.createElement('div');
            div.className = 'tap-animation';
            div.textContent = '+' + tapValue;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 600);
        }

        clickArea.addEventListener('pointerdown', (e) => {
            if (energy >= tapValue) {
                coins += tapValue;
                energy -= tapValue;
                spawnText(e.clientX, e.clientY);
                updateUI();
                
                if (navigator.vibrate) navigator.vibrate(5);
            }
        });

        // Регенерация энергии (2 единицы в секунду)
        setInterval(() => {
            if (energy < maxEnergy) {
                energy = Math.min(maxEnergy, energy + 2);
                updateUI();
            }
        }, 1000);

        // Первичный запуск
        updateUI();
    </script>
</body>
</html>
