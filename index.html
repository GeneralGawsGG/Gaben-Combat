<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gaben Game: Real Profit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            user-select: none;
            overflow: hidden;
            touch-action: manipulation;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loader-bar {
            width: 240px;
            height: 4px;
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 24px;
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: #2563eb;
            box-shadow: 0 0 20px #2563eb;
            animation: load 3s forwards cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }

        .tap-animation {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            font-size: 2.5rem;
            color: #3b82f6;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            animation: float-up 0.7s ease-out forwards;
            z-index: 100;
        }

        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
        }

        .gabe-main-btn:active { transform: scale(0.92); }
        .nav-item.active { color: #3b82f6; }
        .nav-item.active .nav-indicator { background-color: #3b82f6; }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div id="loading-screen">
        <div class="relative mb-8 text-center">
            <div class="absolute -inset-12 bg-blue-600/30 rounded-full blur-3xl animate-pulse"></div>
            <img src="https://cs12.pikabu.ru/post_img/2021/08/12/5/16287520021736990.jpg" 
                 class="w-40 h-40 rounded-full border-4 border-blue-600 relative object-cover shadow-2xl mx-auto">
            <h1 class="text-4xl font-black italic tracking-tighter mt-6 uppercase">Gaben <span class="text-blue-600">Game</span></h1>
        </div>
        <button id="start-btn" class="hidden px-12 py-5 bg-blue-600 rounded-2xl font-black text-base uppercase tracking-widest shadow-lg active:scale-95 transition-transform">ЗАПУСТИТЬ</button>
    </div>

    <div class="w-full max-w-[450px] bg-[#020202] flex flex-col relative border-x border-white/5 shadow-2xl">
        
        <div class="p-6 pb-4 flex justify-between items-start bg-gradient-to-b from-blue-900/10 to-transparent">
            <div>
                <span class="text-[11px] text-blue-500 font-black uppercase tracking-widest opacity-60">Кошелек Steam</span>
                <div class="flex items-center gap-3">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Steam_icon_logo.svg/2048px-Steam_icon_logo.svg.png" class="w-8 h-8" alt="steam">
                    <span id="balance" class="text-4xl font-black italic tracking-tighter">0</span>
                </div>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-neutral-600 font-bold uppercase">Доход/сек</span>
                <p class="text-blue-400 font-black text-xl" id="passive-income">0</p>
            </div>
        </div>

        <div id="game-page" class="flex-1 relative flex flex-col justify-center items-center">
            <div id="click-target" class="relative w-80 h-80 rounded-full border-[10px] border-[#0a0a0a] bg-neutral-900 overflow-hidden shadow-[0_0_80px_rgba(37,99,235,0.15)] gabe-main-btn transition-all duration-75 cursor-pointer">
                <img src="https://cs12.pikabu.ru/post_img/2021/08/12/5/16287520021736990.jpg" class="w-full h-full object-cover pointer-events-none scale-110" draggable="false">
            </div>
            <p class="mt-16 text-[12px] text-blue-800 font-black uppercase tracking-[0.7em] animate-pulse">Тапай по Бате</p>
        </div>

        <div id="market-page" class="flex-1 hidden overflow-y-auto p-6">
            <h2 class="text-2xl font-black italic mb-6">УЛУЧШЕНИЯ</h2>
            <div class="space-y-4">
                <div onclick="buyUpgrade('click')" class="bg-neutral-900/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center active:scale-95 transition-transform cursor-pointer">
                    <div><h3 class="font-bold text-blue-400 uppercase text-xs">Мощный Клик</h3><p class="text-xs text-neutral-500">+1 за тап</p></div>
                    <div class="text-right"><span class="block font-black text-white" id="click-cost">100</span><span class="text-[10px] text-neutral-600 uppercase">Цена</span></div>
                </div>
                <div onclick="buyUpgrade('passive')" class="bg-neutral-900/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center active:scale-95 transition-transform cursor-pointer">
                    <div><h3 class="font-bold text-blue-400 uppercase text-xs">Авто-Кликер</h3><p class="text-xs text-neutral-500">+5/сек</p></div>
                    <div class="text-right"><span class="block font-black text-white" id="passive-cost">500</span><span class="text-[10px] text-neutral-600 uppercase">Цена</span></div>
                </div>
            </div>
        </div>

        <div id="withdraw-page" class="flex-1 hidden p-6">
            <h2 class="text-2xl font-black italic mb-6">ВЫВОД СРЕДСТВ</h2>
            <div class="bg-neutral-900/50 p-6 rounded-3xl border border-white/5">
                <label class="text-[10px] text-neutral-500 uppercase font-black mb-2 block">Номер карты или кошелька</label>
                <input type="text" placeholder="4276 **** **** 0000" class="w-full bg-black border border-neutral-800 rounded-xl p-4 mb-4 text-white font-mono focus:border-blue-600 outline-none">
                <label class="text-[10px] text-neutral-500 uppercase font-black mb-2 block">Сумма вывода (мин. 50,000)</label>
                <div class="text-3xl font-black text-blue-500 mb-6 tracking-tighter">0.00 $</div>
                <button onclick="alert('Недостаточно средств для вывода! Нужно минимум 50,000 монет.')" class="w-full py-4 bg-blue-600 rounded-xl font-black uppercase text-sm tracking-widest active:scale-95 transition-transform shadow-lg">ВЫВЕСТИ В РЕАЛ</button>
            </div>
            <p class="mt-4 text-[9px] text-neutral-600 text-center uppercase tracking-widest font-bold">Транзакции защищены протоколом Mother Engine</p>
        </div>

        <nav class="h-24 bg-black border-t border-white/5 flex justify-around items-center px-4 pb-6">
            <div onclick="showPage('game')" id="nav-game" class="nav-item active flex flex-col items-center gap-1 cursor-pointer">
                <div class="nav-indicator w-8 h-1 rounded-full mb-2 transition-all"></div>
                <img src="https://cs12.pikabu.ru/post_img/2021/08/12/5/16287520021736990.jpg" class="w-7 h-7 rounded-full object-cover border border-current">
                <span class="text-[9px] font-black uppercase tracking-tighter">Игра</span>
            </div>
            <div onclick="showPage('market')" id="nav-market" class="nav-item flex flex-col items-center gap-1 text-neutral-800 cursor-pointer">
                <div class="nav-indicator w-8 h-1 bg-transparent rounded-full mb-2 transition-all"></div>
                <span class="text-2xl">🛒</span>
                <span class="text-[9px] font-black uppercase tracking-tighter">Маркет</span>
            </div>
            <div onclick="showPage('withdraw')" id="nav-withdraw" class="nav-item flex flex-col items-center gap-1 text-neutral-800 cursor-pointer">
                <div class="nav-indicator w-8 h-1 bg-transparent rounded-full mb-2 transition-all"></div>
                <span class="text-2xl">💰</span>
                <span class="text-[9px] font-black uppercase tracking-tighter">Вывод</span>
            </div>
        </nav>
    </div>

    <script>
        let state = {
            coins: Number(localStorage.getItem('g_coins')) || 0,
            tapValue: Number(localStorage.getItem('g_tap')) || 1,
            passiveIncome: Number(localStorage.getItem('g_passive')) || 0,
            costs: { click: Number(localStorage.getItem('g_c_c')) || 100, passive: Number(localStorage.getItem('g_c_p')) || 500 }
        };

        function speak(text, pitch = 0.6) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            msg.pitch = pitch;
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function updateUI() {
            document.getElementById('balance').textContent = Math.floor(state.coins).toLocaleString();
            document.getElementById('passive-income').textContent = state.passiveIncome;
            document.getElementById('click-cost').textContent = state.costs.click;
            document.getElementById('passive-cost').textContent = state.costs.passive;
            localStorage.setItem('g_coins', state.coins);
            localStorage.setItem('g_tap', state.tapValue);
            localStorage.setItem('g_passive', state.passiveIncome);
            localStorage.setItem('g_c_c', state.costs.click);
            localStorage.setItem('g_c_p', state.costs.passive);
        }

        function showPage(page) {
            ['game', 'market', 'withdraw'].forEach(p => document.getElementById(p + '-page').classList.add('hidden'));
            document.getElementById(page + '-page').classList.remove('hidden');
            ['nav-game', 'nav-market', 'nav-withdraw'].forEach(n => {
                document.getElementById(n).classList.remove('active');
                document.getElementById(n).classList.add('text-neutral-800');
            });
            document.getElementById('nav-' + page).classList.add('active');
            document.getElementById('nav-' + page).classList.remove('text-neutral-800');
        }

        document.getElementById('click-target').addEventListener('pointerdown', (e) => {
            state.coins += state.tapValue;
            // Озвучка клика со случайным питчем
            speak("Габен", 0.5 + Math.random() * 0.4);
            
            const num = document.createElement('div');
            num.className = 'tap-animation';
            num.textContent = '+' + state.tapValue;
            num.style.left = e.clientX + 'px';
            num.style.top = (e.clientY - 50) + 'px';
            document.body.appendChild(num);
            setTimeout(() => num.remove(), 700);
            updateUI();
        });

        function buyUpgrade(type) {
            if (type === 'click' && state.coins >= state.costs.click) {
                state.coins -= state.costs.click;
                state.tapValue += 1;
                state.costs.click = Math.floor(state.costs.click * 1.8);
            } else if (type === 'passive' && state.coins >= state.costs.passive) {
                state.coins -= state.costs.passive;
                state.passiveIncome += 5;
                state.costs.passive = Math.floor(state.costs.passive * 2.1);
            }
            updateUI();
        }

        setInterval(() => {
            if (state.passiveIncome > 0) { state.coins += state.passiveIncome / 10; updateUI(); }
        }, 100);

        setTimeout(() => document.getElementById('start-btn').classList.remove('hidden'), 2500);
        document.getElementById('start-btn').addEventListener('click', () => {
            speak("Мать Габена представляет", 0.5);
            document.getElementById('loading-screen').style.transform = 'translateY(-100%)';
        });

        updateUI();
    </script>
</body>
</html>
